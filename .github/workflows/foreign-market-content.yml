name: Foreign Market Content

on:
  workflow_dispatch:
  schedule:
    - cron: "30 7 * * *"

jobs:
  build-digest:
    runs-on: self-hosted
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Debug revision
        run: |
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_REF=$GITHUB_REF"
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
          ls -la
          /home/orange/miniconda3/bin/python3 -V
          /home/orange/miniconda3/bin/python3 - <<'PY'
          from pathlib import Path
          text = Path("scripts/foreign_market_digest.py").read_text(encoding="utf-8")
          print("has_invalid_rss_debug=", "invalid RSS payload" in text)
          print("has_pushplus=", "build_pushplus_payload" in text)
          print("has_wechat_draft=", "create_wechat_draft" in text)
          PY

      - name: Generate foreign market digest
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          WECHAT_APP_ID: ${{ secrets.WECHAT_APP_ID }}
          WECHAT_APP_SECRET: ${{ secrets.WECHAT_APP_SECRET }}
          WECHAT_AUTHOR: ${{ vars.WECHAT_AUTHOR }}
        run: /home/orange/miniconda3/bin/python3 scripts/foreign_market_digest.py --hours 24 --limit 10 --pushplus-token "$PUSHPLUS_TOKEN" --feishu-webhook "$FEISHU_WEBHOOK_URL" --wechat-app-id "$WECHAT_APP_ID" --wechat-app-secret "$WECHAT_APP_SECRET" --wechat-author "$WECHAT_AUTHOR"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: foreign-market-digest
          path: output/
          if-no-files-found: error
