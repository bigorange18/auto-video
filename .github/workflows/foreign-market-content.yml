name: Foreign Market Content

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  build-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate foreign market digest
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: python scripts/foreign_market_digest.py --hours 24 --limit 10 --pushplus-token "$PUSHPLUS_TOKEN" --feishu-webhook "$FEISHU_WEBHOOK_URL"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: foreign-market-digest
          path: output/
          if-no-files-found: error
